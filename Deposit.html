<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Deposit - Voltgain</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .container {
      background: #fff;
      padding: 20px 30px;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      text-align: center;
    }

    h1 {
      color: #222;
      font-size: 24px;
    }

    .qr-code {
      width: 220px;
      height: 220px;
      margin: 20px auto;
      border: 1px solid #ccc;
      padding: 10px;
      border-radius: 10px;
    }

    .upi-id {
      font-size: 18px;
      color: #333;
      margin: 15px 0;
    }

    button.copy-btn {
      background-color: #007bff;
      color: white;
      border: none;
      padding: 10px 18px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
    }

    button.copy-btn:hover {
      background-color: #0056b3;
    }

    .note {
      font-size: 14px;
      color: #777;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Deposit to Voltgain</h1>
    <img src="qr.png" alt="UPI QR Code" class="qr-code" />
    <div class="upi-id">
      UPI ID: <strong id="upiId">7893607189@ybl</strong>
    </div>
    <button class="copy-btn" onclick="copyUPI()">Copy UPI ID</button>
    <div class="note">Scan the code above or copy the UPI ID to deposit.</div>
  </div>

  <script>
    function copyUPI() {
      const upiText = document.getElementById("upiId").innerText;
      navigator.clipboard.writeText(upiText)
        .then(() => alert("UPI ID copied to clipboard!"))
        .catch(() => alert("Failed to copy UPI ID."));
    }
  </script>
</body>
</html>
