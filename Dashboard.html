<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voltgain Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #f2f6fc;
      color: #333;
    }

    header {
      background-color: #111;
      color: #fff;
      padding: 20px;
      font-size: 30px;
      font-weight: bold;
      text-align: center;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
    }

    .button-row {
      display: flex;
      justify-content: space-around;
      margin: 20px;
    }

    .button {
      padding: 12px 20px;
      font-size: 16px;
      background-color: #4a90e2;
      color: white;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      transition: 0.3s;
    }

    .button:hover {
      background-color: #2f74c0;
    }

    .plans {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin: 20px;
    }

    .plan {
      background-color: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 20px;
      margin: 10px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.05);
    }

    .plan-title {
      font-size: 22px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .plan-details {
      font-size: 16px;
    }
  </style>
</head>
<body>

<header>⚡ VOLTGAIN ⚡</header>

<div class="button-row">
  <a href="deposit.html" class="button">
    <img src="https://img.icons8.com/ios-filled/24/money.png"/> Deposit
  </a>
  <a href="withdrawal.html" class="button">
    <img src="https://img.icons8.com/ios-filled/24/bank-card-back-side.png"/> Withdraw
  </a>
  <a href="help.html" class="button">
    <img src="https://img.icons8.com/ios-filled/24/help.png"/> Help
  </a>
</div>

<div class="plans">
  <div class="plan">
    <div class="plan-title">PLAN 1</div>
    <div class="plan-details">₹199 • 15 Days • Daily ₹50</div>
  </div>
  <div class="plan">
    <div class="plan-title">PLAN 2</div>
    <div class="plan-details">₹499 • 35 Days • Daily ₹129</div>
  </div>
  <div class="plan">
    <div class="plan-title">PLAN 3</div>
    <div class="plan-details">₹999 • 50 Days • Daily ₹349</div>
  </div>
  <div class="plan">
    <div class="plan-title">PLAN 4</div>
    <div class="plan-details">₹1299 • 25 Days • Daily ₹550</div>
  </div>
  <div class="plan">
    <div class="plan-title">PLAN 5</div>
    <div class="plan-details">₹2299 • 10 Days • Daily ₹1199</div>
  </div>
</div>

</body>
</html>
