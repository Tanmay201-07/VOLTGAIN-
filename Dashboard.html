<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voltgain Dashboard</title>
  <style>
    body {
      margin: 0;
      background: #0f0f0f;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      color: white;
      text-align: center;
    }

    header {
      background: #ff3c00;
      padding: 20px;
      font-size: 2rem;
      font-family: 'Orbitron', sans-serif;
      letter-spacing: 2px;
      box-shadow: 0 2px 10px #ff3c00;
    }

    .actions {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin: 20px 0;
    }

    .action-btn {
      background: #1a1a1a;
      border: 2px solid #ff3c00;
      padding: 15px 25px;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .action-btn:hover {
      background: #ff3c00;
      color: black;
    }

    .plans {
      display: flex;
      flex-direction: column;
      gap: 15px;
      padding: 0 20px;
      margin-bottom: 40px;
    }

    .plan {
      background: #1c1c1c;
      border: 2px solid #ff3c00;
      padding: 15px;
      border-radius: 12px;
    }

    .plan h3 {
      margin: 0;
      font-size: 1.1rem;
    }

  </style>
</head>
<body>
  <header>⚡ VOLTGAIN ⚡</header>

  <div class="actions">
    <div class="action-btn" onclick="window.location.href='deposit.html'">💰 Deposit</div>
    <div class="action-btn" onclick="window.location.href='withdraw.html'">🏦 Withdraw</div>
    <div class="action-btn" onclick="window.location.href='https://t.me/YOUR_CHANNEL'">📞 Help</div>
  </div>

  <div class="plans">
    <div class="plan">
      <h3>PLAN 1: ₹199 - 15 DAYS - DAILY ₹50</h3>
    </div>
    <div class="plan">
      <h3>PLAN 2: ₹499 - 35 DAYS - DAILY ₹129</h3>
    </div>
    <div class="plan">
      <h3>PLAN 3: ₹999 - 50 DAYS - DAILY ₹349</h3>
    </div>
    <div class="plan">
      <h3>PLAN 4: ₹1299 - 25 DAYS - DAILY ₹550</h3>
    </div>
    <div class="plan">
      <h3>PLAN 5: ₹2299 - 10 DAYS - DAILY ₹1199</h3>
    </div>
  </div>
</body>
</html>
