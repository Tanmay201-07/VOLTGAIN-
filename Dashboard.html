<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Voltgain - Dashboard</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f7f7f7;
      color: #333;
    }

    header {
      background-color: #222;
      padding: 20px;
      text-align: center;
    }

    header h1 {
      font-family: 'Orbitron', sans-serif;
      font-size: 32px;
      color: #ff9900;
      letter-spacing: 2px;
    }

    .nav-buttons {
      display: flex;
      justify-content: center;
      margin: 20px 0;
      gap: 20px;
    }

    .nav-buttons a button {
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background-color: #ff9900;
      color: white;
      transition: background-color 0.3s;
    }

    .nav-buttons a button:hover {
      background-color: #cc7a00;
    }

    .plans {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    .plan {
      background-color: #fff;
      border: 2px solid #ff9900;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .plan h2 {
      margin: 0 0 10px;
      color: #ff9900;
    }

    .plan p {
      margin: 5px 0;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <header>
    <h1>VOLTGAIN</h1>
  </header>

  <div class="nav-buttons">
    <a href="deposit.html"><button>Deposit</button></a>
    <a href="withdraw.html"><button>Withdraw</button></a>
    <a href="help.html"><button>Help</button></a>
  </div>

  <div class="plans">
    <div class="plan">
      <h2>PLAN 1</h2>
      <p>₹199 • 15 Days</p>
      <p>Daily Return: ₹50</p>
    </div>

    <div class="plan">
      <h2>PLAN 2</h2>
      <p>₹499 • 35 Days</p>
      <p>Daily Return: ₹129</p>
    </div>

    <div class="plan">
      <h2>PLAN 3</h2>
      <p>₹999 • 50 Days</p>
      <p>Daily Return: ₹349</p>
    </div>

    <div class="plan">
      <h2>PLAN 4</h2>
      <p>₹1299 • 25 Days</p>
      <p>Daily Return: ₹550</p>
    </div>

    <div class="plan">
      <h2>PLAN 5</h2>
      <p>₹2299 • 10 Days</p>
      <p>Daily Return: ₹1199</p>
    </div>
  </div>
</body>
</html>
