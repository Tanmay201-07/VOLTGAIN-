<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Withdrawal - Voltgain</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      margin: 0;
      padding: 20px;
      text-align: center;
    }
    h1 {
      color: #2c3e50;
    }
    form {
      background: #fff;
      max-width: 400px;
      margin: 30px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    input[type="text"],
    input[type="number"] {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }
    button {
      background-color: #27ae60;
      color: white;
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
    }
    button:hover {
      background-color: #219150;
    }
    #message {
      color: green;
      margin-top: 20px;
    }
  </style>
</head>
<body>

  <h1>Withdraw Funds</h1>

  <form id="withdrawalForm">
    <input type="text" id="account" placeholder="Account Number" required />
    <input type="text" id="ifsc" placeholder="IFSC Code" required />
    <input type="text" id="bank" placeholder="Bank Name" required />
    <input type="number" id="amount" placeholder="Amount (₹)" required />
    <button type="submit">Submit Withdrawal</button>
  </form>

  <p id="message"></p>

  <script>
    document.getElementById("withdrawalForm").addEventListener("submit", function (e) {
      e.preventDefault();

      const account = document.getElementById("account").value;
      const ifsc = document.getElementById("ifsc").value;
      const bank = document.getElementById("bank").value;
      const amount = document.getElementById("amount").value;

      // You can send this data to a backend here
      console.log("Submitting:", { account, ifsc, bank, amount });

      // Simulate success
      document.getElementById("message").textContent = "Withdrawal submitted successfully!";
      this.reset();
    });
  </script>

</body>
</html>
