<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>VOLTGain - Login</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f0f0f;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }
    .container {
      background: #1f1f1f;
      padding: 40px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffcc;
      width: 300px;
    }
    h2 {
      text-align: center;
      color: #00ffcc;
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
      border: none;
      border-radius: 5px;
    }
    button {
      background: #00ffcc;
      color: black;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 5px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="container">
    <h2>VOLTGain Login</h2>
    <input type="text" placeholder="Username" id="username">
    <input type="password" placeholder="Password" id="password">
    <button onclick="login()">Login</button>
    <p style="text-align:center;">or</p>
    <button onclick="register()">Register</button>
  </div>

  <script>
    function login() {
      // Simple redirect for now
      window.location.href = "dashboard.html";
    }

    function register() {
      window.location.href = "dashboard.html";
    }
  </script>
</body>
</html>
